name: Remote Feature Lane

on:
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.11"

jobs:
  workflow-lint:
    name: Feature Lane / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1

  lint-dependency-governance:
    name: Feature Lane / Lint Dependency Governance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: make install-ci
      - name: Install OpenAPI governance tooling
        run: npm ci
      - name: Verify Dependencies
        run: make verify-dependencies
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: No Alias Contract Guard
        run: make no-alias-gate
      - name: API Vocabulary Gate
        run: make api-vocabulary-gate
      - name: Quality Baseline Freshness
        run: make quality-baseline-check
      - name: Checkout Lotus Platform Contracts
        uses: actions/checkout@v6
        with:
          repository: sgajbi/lotus-platform
          path: lotus-platform
      - name: Domain Data Products Gate
        env:
          LOTUS_PLATFORM_ROOT: ${{ github.workspace }}/lotus-platform
        run: make domain-data-products-gate
      - name: Observability Diagnostics
        run: make observability-diagnostics
      - name: Advisory Domain Golden Regressions
        run: make advisory-domain-golden-regressions
      - name: Migration Smoke
        run: make migration-smoke
      - name: Bandit High Severity Gate
        run: make bandit-high-severity-gate

  unit-tests:
    name: Feature Lane / Tests (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run unit tests
        run: make test-unit
