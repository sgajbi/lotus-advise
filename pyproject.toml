[tool.ruff]
# Set the maximum line length to 100
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Enable Pyflakes (F), pycodestyle (E), and isort (I)
select = ["E", "F", "I"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
fail_under = 97
show_missing = true
skip_covered = false

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv"]
skips = []

[tool.interrogate]
ignore-init = true
ignore-init-module = true
ignore-magic = true
ignore-semiprivate = false
ignore-private = false
fail-under = 0
verbose = 1

[tool.deptry]
known_first_party = ["engineering_health_report"]
per_rule_ignores = { DEP002 = [
  "coverage",
  "iniconfig",
  "pip-audit",
  "pluggy",
  "pytest",
  "pytest-cov",
  "ruff",
  "mypy",
] }
