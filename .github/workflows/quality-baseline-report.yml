name: Quality Baseline Report

on:
  push:
    branches-ignore: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.11"

jobs:
  quality-baseline:
    name: Quality Baseline / Report Only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: make install-ci
      - name: Install OpenAPI report tooling
        run: npm ci
      - name: Generate quality reports
        run: make quality-baseline
      - name: Upload quality reports
        uses: actions/upload-artifact@v7
        with:
          name: lotus-advise-quality-baseline
          path: quality/*.md
