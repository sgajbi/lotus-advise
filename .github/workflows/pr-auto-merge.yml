name: PR Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  queue-auto-merge:
    name: Queue Auto Merge
    if: >
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    concurrency:
      group: pr-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify main branch is protected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/branches/main" > /tmp/main-branch.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("/tmp/main-branch.json").read_text())
          if payload.get("protected") is not True:
              raise SystemExit("main branch must be protected before auto-merge can be queued")
          protection = payload.get("protection") or {}
          required_checks = (protection.get("required_status_checks") or {}).get("contexts") or []
          if not required_checks:
              raise SystemExit(
                  "main branch must require status checks before auto-merge can be queued"
              )
          print(f"main branch protection requires {len(required_checks)} status checks")
          PY
      - name: Enable auto-merge queue (rebase)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          output=$(gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --rebase --delete-branch 2>&1)
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "$output"
            exit 0
          fi
          if echo "$output" | grep -qi "already"; then
            echo "$output"
            exit 0
          fi
          echo "$output"
          exit "$code"
