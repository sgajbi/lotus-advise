version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      github-actions-updates:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
      day: "monday"
    # Routine version-update PRs are paused during active Lotus RFC delivery.
    # Security alerts/updates stay governed through GitHub Security posture.
    open-pull-requests-limit: 0

  - package-ecosystem: "pip"
    directory: "/"
    groups:
      python-dependency-updates:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
      day: "monday"
    # Routine version-update PRs are paused during active Lotus RFC delivery.
    # Security alerts/updates stay governed through GitHub Security posture.
    open-pull-requests-limit: 0
