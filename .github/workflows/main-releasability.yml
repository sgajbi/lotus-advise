name: Main Releasability Gate

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.11"

jobs:
  workflow-lint:
    name: Main Releasability / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1

  lint-typecheck-governance:
    name: Main Releasability / Lint Typecheck Governance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: make install-ci
      - name: Install OpenAPI governance tooling
        run: npm ci
      - name: Verify Dependencies
        run: make verify-dependencies
      - name: Dependency Freshness
        run: make check-deps-strict
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: No Alias Contract Guard
        run: make no-alias-gate
      - name: API Vocabulary Gate
        run: make api-vocabulary-gate
      - name: Quality Baseline Freshness
        run: make quality-baseline-check
      - name: Trust Telemetry Freshness
        run: make trust-telemetry-freshness-gate
      - name: Checkout Lotus Platform Contracts
        uses: actions/checkout@v7
        with:
          repository: sgajbi/lotus-platform
          path: lotus-platform
      - name: Domain Data Products Gate
        env:
          LOTUS_PLATFORM_ROOT: ${{ github.workspace }}/lotus-platform
        run: make domain-data-products-gate
      - name: Observability Diagnostics
        run: make observability-diagnostics
      - name: Advisory Domain Golden Regressions
        run: make advisory-domain-golden-regressions
      - name: Migration Smoke
        run: make migration-smoke
      - name: Security Audit
        run: make security-audit
      - name: Dependency Lock Gate
        run: make dependency-lock-gate
      - name: License IP Gate
        run: make license-ip-gate

  test-suites:
    name: Main Releasability / Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            path: tests/unit
          - suite: integration
            path: tests/integration
          - suite: e2e
            path: tests/e2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run tests with coverage data
        env:
          COVERAGE_FILE: .coverage.${{ matrix.suite }}
        run: python -m pytest ${{ matrix.path }} --cov=src --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: main-releasability-coverage-data-${{ matrix.suite }}
          path: .coverage.${{ matrix.suite }}
          include-hidden-files: true
          if-no-files-found: error

  coverage-gate:
    name: Main Releasability / Coverage Gate (Combined)
    needs: [test-suites]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: main-releasability-coverage-data-*
          merge-multiple: true
          path: coverage-data
      - name: Enforce coverage floor
        run: |
          python -m coverage combine coverage-data
          python -m coverage report --fail-under=97

  postgres-migration-smoke:
    name: Main Releasability / Postgres Migration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.6
        env:
          POSTGRES_DB: lotus_advise
          POSTGRES_USER: lotus
          POSTGRES_PASSWORD: lotus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lotus -d lotus_advise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run Postgres migration smoke
        env:
          PROPOSAL_POSTGRES_DSN: postgresql://lotus:lotus@127.0.0.1:5432/lotus_advise
          PROPOSAL_POSTGRES_INTEGRATION_DSN: postgresql://lotus:lotus@127.0.0.1:5432/lotus_advise
        run: python scripts/run_runtime_smoke_checks.py postgres-migration-smoke

  production-profile-smoke:
    name: Main Releasability / Production Profile Startup Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.6
        env:
          POSTGRES_DB: lotus_advise
          POSTGRES_USER: lotus
          POSTGRES_PASSWORD: lotus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lotus -d lotus_advise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run production profile startup smoke
        env:
          PROPOSAL_STORE_BACKEND: POSTGRES
          PROPOSAL_POSTGRES_DSN: postgresql://lotus:lotus@127.0.0.1:5432/lotus_advise
          PROPOSAL_POSTGRES_INTEGRATION_DSN: postgresql://lotus:lotus@127.0.0.1:5432/lotus_advise
        run: python scripts/run_runtime_smoke_checks.py production-profile-smoke

  production-profile-guardrail-negatives:
    name: Main Releasability / Production Profile Guardrail Negatives
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run production guardrail negatives
        run: python scripts/run_runtime_smoke_checks.py production-profile-guardrail-negatives

  docker-build:
    name: Main Releasability / Validate Docker Build
    needs: [coverage-gate, postgres-migration-smoke, production-profile-smoke, production-profile-guardrail-negatives]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        env:
          CI_PIPELINE_ID: ${{ github.run_id }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_DIGEST: resolved-after-push
        run: make docker-build

  image-release-evidence:
    name: Main Releasability / Image Release Evidence
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
      RELEASE_OUTPUT_DIR: output/release
      SERVICE_VERSION: "0.1.0"
      TRIVY_VERSION: "0.72.0"
    steps:
      - uses: actions/checkout@v7
      - name: Set release timestamp
        run: echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Git SHA image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_REF }}
          build-args: |
            LOTUS_BUILD_COMMIT_SHA=${{ github.sha }}
            LOTUS_BUILD_GIT_BRANCH=${{ github.ref_name }}
            LOTUS_BUILD_REPO_URL=${{ github.server_url }}/${{ github.repository }}
            LOTUS_BUILD_VERSION=${{ env.SERVICE_VERSION }}
            LOTUS_BUILD_TIMESTAMP=${{ env.BUILD_TIMESTAMP }}
            LOTUS_CI_PIPELINE_ID=${{ github.run_id }}
            LOTUS_IMAGE_DIGEST=resolved-after-push
          labels: |
            org.opencontainers.image.title=lotus-advise
            org.opencontainers.image.description=Lotus Advise advisory workflow service
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.version=${{ env.SERVICE_VERSION }}
            org.opencontainers.image.created=${{ env.BUILD_TIMESTAMP }}
            org.opencontainers.image.vendor=Lotus
            com.lotus.ci.run-id=${{ github.run_id }}
            com.lotus.image.digest=resolved-after-push
      - name: Create release output directory
        run: mkdir -p "$RELEASE_OUTPUT_DIR"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REF }}
          output-file: output/release/lotus-advise.spdx.json
          upload-artifact: false
      - name: Install Trivy CLI
        run: |
          set -euo pipefail
          trivy_release_base="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          checksum_file="trivy_${TRIVY_VERSION}_checksums.txt"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$trivy_release_base/$archive"
          curl -fsSLo "$RUNNER_TEMP/$checksum_file" "$trivy_release_base/$checksum_file"
          cd "$RUNNER_TEMP"
          expected_checksum="$(awk -v file="$archive" '$2 == file || $2 == "*" file { print $1; exit }' "$checksum_file")"
          test -n "$expected_checksum"
          actual_checksum="$(sha256sum "$archive" | cut -d' ' -f1)"
          test "$expected_checksum" = "$actual_checksum"
          tar -xzf "$archive" trivy
          mkdir -p "$HOME/.local/bin"
          install -m 0755 trivy "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version
      - name: Scan image vulnerabilities
        run: >-
          trivy image
          --format json
          --output output/release/trivy-image-scan.json
          --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          --exit-code 1
          "$IMAGE_REF"
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.2
      - name: Sign image digest
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes "${IMAGE_REF}@${{ steps.build.outputs.digest }}"
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_REF }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Write release evidence manifest
        run: >-
          python scripts/release_image_evidence.py write-manifest
          --image-ref "$IMAGE_REF"
          --image-digest "${{ steps.build.outputs.digest }}"
          --commit-sha "${{ github.sha }}"
          --git-ref "${{ github.ref_name }}"
          --repository-url "${{ github.server_url }}/${{ github.repository }}"
          --service-version "$SERVICE_VERSION"
          --build-timestamp-utc "$BUILD_TIMESTAMP"
          --ci-pipeline-run-id "${{ github.run_id }}"
          --sbom-path "output/release/lotus-advise.spdx.json"
          --vulnerability-scan-path "output/release/trivy-image-scan.json"
          --signature-ref "${IMAGE_REF}@${{ steps.build.outputs.digest }}"
          --provenance-attestation-ref "${IMAGE_REF}@${{ steps.build.outputs.digest }}"
          --output "output/release/release-evidence.json"
      - name: Upload image release evidence
        uses: actions/upload-artifact@v7
        with:
          name: lotus-advise-image-release-evidence
          path: output/release/
          if-no-files-found: error
